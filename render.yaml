services:
  - type: web
    name: guvi-doc-ai
    env: python
    runtime: python-3.11
    plan: free
    buildCommand: >
      apt-get update && 
      apt-get install -y tesseract-ocr tesseract-ocr-eng &&
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: API_KEY
        value: test123
